{% extends "layout.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-container">
    <h2>Reset Password</h2>
    <p>Create a strong new password</p>

    <form method="POST">
      <div class="form-group password-wrapper mt-3">
        <label>New Password</label>
        <input type="password" name="password" id="new_password" class="form-control" required>
        <i class="fas fa-eye password-toggle" onclick="togglePassword('new_password', this)"></i>
      </div>

      <div class="form-group password-wrapper mt-3">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" id="confirm_password" class="form-control" required>
        <i class="fas fa-eye password-toggle" onclick="togglePassword('confirm_password', this)"></i>
      </div>

      <button class="btn btn-success w-100 mt-4">Reset Password</button>
    </form>

    <p class="mt-3 text-center">
      <a href="{{ url_for('login') }}">← Back to Login</a>
    </p>
  </div>
</div>
{% endblock %}
